<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的链接收藏夹</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0e0d;
      --surface: #1a1916;
      --border: #2e2c28;
      --gold: #c9a84c;
      --gold-light: #e8c96a;
      --text: #e8e4dc;
      --muted: #7a7568;
      --danger: #c0392b;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      padding: 40px 20px 80px;
    }

    /* subtle grain overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: 0.4;
    }

    .container { max-width: 680px; margin: 0 auto; position: relative; z-index: 1; }

    /* Header */
    header { margin-bottom: 48px; }
    .header-label {
      font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--gold); font-weight: 500; margin-bottom: 10px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(32px, 6vw, 52px);
      line-height: 1.1;
      color: var(--text);
      margin-bottom: 8px;
    }
    .subtitle { color: var(--muted); font-size: 14px; }

    /* Add Form */
    .add-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 36px;
      animation: fadeUp 0.4s ease both;
    }
    .form-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .form-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 160px; }
    label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); font-weight: 500; }
    input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--gold); }
    input::placeholder { color: var(--muted); }

    .btn-add {
      background: var(--gold);
      color: #0f0e0d;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 1px;
      padding: 10px 24px;
      cursor: pointer;
      align-self: flex-end;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .btn-add:hover { background: var(--gold-light); }
    .btn-add:active { transform: scale(0.97); }

    /* Category filter */
    .filters {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      padding: 5px 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
      border-color: var(--gold);
      color: var(--gold);
    }

    /* Search */
    .search-wrap { margin-bottom: 20px; }
    .search-wrap input { width: 100%; }

    /* Stats bar */
    .stats { font-size: 12px; color: var(--muted); margin-bottom: 20px; }
    .stats span { color: var(--gold); font-weight: 500; }

    /* Bookmark list */
    #list { display: flex; flex-direction: column; gap: 10px; }

    .bookmark-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex; align-items: center; gap: 14px;
      padding: 16px 18px;
      text-decoration: none;
      transition: border-color 0.2s, transform 0.15s;
      animation: fadeUp 0.3s ease both;
      position: relative;
      overflow: hidden;
    }
    .bookmark-item::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--gold);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .bookmark-item:hover { border-color: var(--border); transform: translateX(4px); }
    .bookmark-item:hover::before { opacity: 1; }

    .favicon {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
      overflow: hidden;
    }
    .favicon img { width: 100%; height: 100%; object-fit: contain; border-radius: 6px; }

    .info { flex: 1; min-width: 0; }
    .bookmark-name {
      font-size: 15px; font-weight: 500; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .bookmark-url {
      font-size: 12px; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-top: 2px;
    }

    .tag {
      font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
      color: var(--gold); border: 1px solid var(--gold);
      border-radius: 4px; padding: 2px 7px;
      flex-shrink: 0; opacity: 0.7;
    }

    .btn-del {
      background: transparent; border: none;
      color: var(--muted); cursor: pointer; font-size: 16px;
      padding: 4px 6px; border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }
    .btn-del:hover { color: var(--danger); background: rgba(192,57,43,0.1); }

    /* Empty state */
    .empty {
      text-align: center; padding: 60px 20px;
      color: var(--muted); font-size: 14px; line-height: 2;
    }
    .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }

    /* Toast */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(60px);
      background: var(--gold); color: #0f0e0d;
      font-size: 13px; font-weight: 500;
      padding: 10px 24px; border-radius: 30px;
      opacity: 0; transition: all 0.3s ease;
      z-index: 999; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-label">我的收藏夹</div>
    <h1>Link<br>Archive</h1>
    <p class="subtitle">保存你的常用网址，随时一键直达</p>
  </header>

  <!-- Add Form -->
  <div class="add-form">
    <div class="form-row">
      <div class="form-group" style="flex:2">
        <label>网址 URL</label>
        <input id="inp-url" type="url" placeholder="https://example.com" />
      </div>
      <div class="form-group" style="flex:2">
        <label>名称</label>
        <input id="inp-name" type="text" placeholder="给它取个名字" />
      </div>
      <div class="form-group" style="flex:1">
        <label>分类</label>
        <input id="inp-tag" type="text" placeholder="工具 / 学习 / 娱乐" />
      </div>
      <button class="btn-add" onclick="addBookmark()">＋ 添加</button>
    </div>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <input id="inp-search" type="text" placeholder="🔍  搜索名称或网址…" oninput="render()" />
  </div>

  <!-- Filters -->
  <div class="filters" id="filters"></div>

  <!-- Stats -->
  <div class="stats" id="stats"></div>

  <!-- List -->
  <div id="list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  let bookmarks = JSON.parse(localStorage.getItem('lnk_bookmarks') || '[]');
  let activeTag = '全部';

  function save() {
    localStorage.setItem('lnk_bookmarks', JSON.stringify(bookmarks));
  }

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2200);
  }

  function getFavicon(url) {
    try {
      const domain = new URL(url).hostname;
      return `https://www.google.com/s2/favicons?sz=64&domain=${domain}`;
    } catch { return null; }
  }

  function normalizeUrl(url) {
    if (!url.startsWith('http://') && !url.startsWith('https://')) return 'https://' + url;
    return url;
  }

  function addBookmark() {
    let url = document.getElementById('inp-url').value.trim();
    let name = document.getElementById('inp-name').value.trim();
    let tag = document.getElementById('inp-tag').value.trim() || '其他';

    if (!url) { toast('⚠️  请输入网址'); return; }
    url = normalizeUrl(url);
    if (!name) {
      try { name = new URL(url).hostname.replace('www.', ''); }
      catch { name = url; }
    }

    bookmarks.unshift({ id: Date.now(), url, name, tag });
    save();
    document.getElementById('inp-url').value = '';
    document.getElementById('inp-name').value = '';
    document.getElementById('inp-tag').value = '';
    toast('✅  已添加：' + name);
    render();
  }

  function deleteBookmark(id) {
    bookmarks = bookmarks.filter(b => b.id !== id);
    save(); render();
    toast('🗑  已删除');
  }

  function render() {
    const q = document.getElementById('inp-search').value.toLowerCase();
    const tags = ['全部', ...new Set(bookmarks.map(b => b.tag))];

    // Filters
    const fEl = document.getElementById('filters');
    fEl.innerHTML = tags.map(t =>
      `<button class="filter-btn ${t === activeTag ? 'active' : ''}" onclick="setTag('${t}')">${t}</button>`
    ).join('');

    // Filtered list
    let filtered = bookmarks;
    if (activeTag !== '全部') filtered = filtered.filter(b => b.tag === activeTag);
    if (q) filtered = filtered.filter(b => b.name.toLowerCase().includes(q) || b.url.toLowerCase().includes(q));

    // Stats
    document.getElementById('stats').innerHTML =
      `共 <span>${bookmarks.length}</span> 个链接，当前显示 <span>${filtered.length}</span> 个`;

    // List
    const listEl = document.getElementById('list');
    if (filtered.length === 0) {
      listEl.innerHTML = `<div class="empty"><div class="empty-icon">🔗</div>还没有收藏，快去添加第一个链接吧！</div>`;
      return;
    }
    listEl.innerHTML = filtered.map(b => {
      const fav = getFavicon(b.url);
      return `
        <div class="bookmark-item" style="cursor:default">
          <div class="favicon">
            ${fav ? `<img src="${fav}" onerror="this.parentNode.textContent='🌐'" />` : '🌐'}
          </div>
          <div class="info">
            <a href="${b.url}" target="_blank" rel="noopener" class="bookmark-name" style="text-decoration:none;color:inherit;display:block">${b.name}</a>
            <div class="bookmark-url">${b.url}</div>
          </div>
          <div class="tag">${b.tag}</div>
          <button class="btn-del" onclick="deleteBookmark(${b.id})" title="删除">✕</button>
        </div>`;
    }).join('');
  }

  function setTag(tag) {
    activeTag = tag;
    render();
  }

  // Enter to add
  ['inp-url','inp-name','inp-tag'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') addBookmark();
    });
  });

  // Init with demo data
  if (bookmarks.length === 0) {
    bookmarks = [
      { id: 1, url: 'https://github.com', name: 'GitHub', tag: '开发' },
      { id: 2, url: 'https://developer.mozilla.org', name: 'MDN Web Docs', tag: '学习' },
      { id: 3, url: 'https://figma.com', name: 'Figma', tag: '设计' },
    ];
    save();
  }

  render();
</script>
</body>
</html>
